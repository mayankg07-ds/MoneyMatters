spring:
  application:
    name: MoneyMatters
    version: 1.0.0

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${CLERK_JWK_SET_URI:https://classic-quail-60.clerk.accounts.dev/.well-known/jwks.json}
          issuer-uri: ${CLERK_ISSUER_URI:https://classic-quail-60.clerk.accounts.dev}

  # Cache Configuration
  cache:
    type: simple  # Use simple in-memory cache
    cache-names:
      - stockPrices
      - portfolioAnalytics

  # Database Configuration (PostgreSQL via environment variables)
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/moneymatters}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:}
    hikari:
      maximum-pool-size: 5
      connection-timeout: 20000

  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 10
        order_inserts: true
        order_updates: true

  # H2 Console (disabled — using PostgreSQL)
  h2:
    console:
      enabled: false

  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
    default-property-inclusion: non_null

# Application-specific settings
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Server Configuration
server:
  port: 8082
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on-param

# Management Endpoints
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: when-authorized
    shutdown:
      enabled: true

# Logging Configuration
logging:
  level:
    root: INFO
    com.moneymatters: DEBUG
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.springframework.data: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/moneymatters.log
    max-size: 10MB
    max-history: 30